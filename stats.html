<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Live Stats Bar Compact</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:'Orbitron',sans-serif;
}

#bar{
    position:absolute;
    top:10px;
    right:10px;

    display:flex;
    align-items:center;
    gap:10px;
}

/* LIVE DOT */

.live-dot{
    width:7px;
    height:7px;
    border-radius:50%;
    background:#00ff88;
    animation:pulse 1.5s infinite;
}

.live-dot.off{ background:#ff4444; }
.live-dot.upcoming{ background:#ffb300; }

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.3}
}

/* BLOCKS */

.block{
    display:flex;
    align-items:baseline;
    gap:5px;

    padding:6px 10px;
    background:rgba(0,0,0,0.88);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:999px;

    backdrop-filter: blur(8px);
}

.label{
    font-size:9px;
    color:#aaa;
}

.value{
    font-size:12px;
    font-weight:700;
}

.viewers{color:#00ff88;}
.peak{color:#ffb300;}
.subs{color:#00e5ff;}
.goal{color:#ff5f7a;}

.divider{
    width:1px;
    height:16px;
    background:rgba(255,255,255,0.15);
}

#progressWrap{
    width:55px;
    height:4px;
    background:rgba(0,0,0,0.6);
    border-radius:10px;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.12);
}

#progressBar{
    height:100%;
    width:0%;
    background:#00e5ff;
    transition:width .6s ease;
}

#status{
    font-size:9px;
    color:#888;
    padding:6px 8px;
    background:rgba(0,0,0,0.75);
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.10);
}

</style>
</head>

<body>

<div id="bar">

    <div class="live-dot" id="dot"></div>

    <div class="block">
        <span class="label">LIVE</span>
        <span class="value viewers" id="live">0</span>
    </div>

    <div class="divider"></div>

    <div class="block">
        <span class="label">PEAK</span>
        <span class="value peak" id="peak">0</span>
    </div>

    <div class="divider"></div>

    <div class="block">
        <span class="label">SUBS</span>
        <span class="value subs" id="subs">0</span>
    </div>

    <div class="divider"></div>

    <div class="block">
        <span class="label">GOAL</span>
        <span class="value goal" id="goal">1000</span>
    </div>

    <div class="divider"></div>

    <div id="progressWrap">
        <div id="progressBar"></div>
    </div>

    <div id="status">SYNC</div>

</div>

<script>

const GOAL = 1000;

/* Your stats endpoint (subs/peak/live viewers) */
const STATS_API =
"https://crowrulesentertainment-oss.github.io/bonded-in-mystery/youtube-stats.php";

/* YouTube API (LIVE STATUS ONLY) */
const YT_API_KEY = "YOUR_YOUTUBE_API_KEY";
const CHANNEL_ID = "YOUR_CHANNEL_ID";

let lastLiveState = "unknown";

/* =======================
   ANIMATION
======================= */

function animate(el, target){
    let start = parseFloat(el.dataset.val || 0);
    let diff = target - start;
    let steps = 20;
    let i = 0;

    let interval = setInterval(() => {
        i++;
        start += diff / steps;

        if(i >= steps){
            start = target;
            clearInterval(interval);
        }

        el.textContent = Math.floor(start).toLocaleString();
        el.dataset.val = start;

    }, 30);
}

/* =======================
   FETCH STATS
======================= */

async function fetchStats(){
    try{
        const res = await fetch(STATS_API + "?t=" + Date.now());
        return await res.json();
    } catch(e){
        document.getElementById("status").textContent = "RETRY";
        return null;
    }
}

/* =======================
   YOUTUBE LIVE STATUS CHECK
======================= */

async function fetchLiveStatus(){

    try{
        const url =
`https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${CHANNEL_ID}&key=${YT_API_KEY}`;

        const res = await fetch(url);
        const data = await res.json();

        const status = data.items?.[0]?.snippet?.liveBroadcastContent;

        // live | upcoming | none
        return status || "unknown";

    } catch(e){
        return "unknown";
    }
}

/* =======================
   APPLY STATS
======================= */

function applyStats(data){

    const live = data.liveViewers || 0;
    const peak = data.peakViewers || 0;
    const subs = data.subscribers || 0;

    animate(document.getElementById("live"), live);
    animate(document.getElementById("peak"), peak);
    animate(document.getElementById("subs"), subs);

    const percent = Math.min((subs / GOAL) * 100, 100);

    document.getElementById("progressBar").style.width =
        percent.toFixed(1) + "%";

    document.getElementById("goal").textContent =
        GOAL.toLocaleString();
}

/* =======================
   STATUS UI
======================= */

function applyLiveState(state){

    const dot = document.getElementById("dot");
    const status = document.getElementById("status");

    dot.classList.remove("off","upcoming");

    if(state === "live"){
        status.textContent = "LIVE";
        dot.classList.remove("off");
    }
    else if(state === "upcoming"){
        status.textContent = "UPCOMING";
        dot.classList.add("upcoming");
    }
    else{
        status.textContent = "OFFLINE";
        dot.classList.add("off");
    }

    lastLiveState = state;
}

/* =======================
   MAIN LOOP
======================= */

async function update(){

    const [stats, liveState] = await Promise.all([
        fetchStats(),
        fetchLiveStatus()
    ]);

    if(stats){
        applyStats(stats);
    }

    applyLiveState(liveState);

}

update();
setInterval(update, 12000);

</script>

</body>
</html>

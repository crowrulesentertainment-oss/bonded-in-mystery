<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Stats Bar Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    font-family: Orbitron, sans-serif;
}

/* MAIN BAR */
.bar-container {
    position: absolute;
    bottom: 25px;
    left: 50%;
    transform: translateX(-50%);
    width: 900px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 10px 20px;
    background: rgba(0,0,0,0.65);
    border: 1px solid #00f0ff;
    border-radius: 14px;
    box-shadow: 0 0 20px rgba(0,240,255,0.35);
    color: #fff;
}

/* STAT BLOCKS */
.stat {
    text-align: center;
    flex: 1;
}

.label {
    font-size: 10px;
    opacity: 0.7;
    letter-spacing: 1px;
}

.value {
    font-size: 18px;
    font-weight: 700;
    color: #00f0ff;
}

/* DIVIDER */
.divider {
    width: 1px;
    height: 35px;
    background: rgba(255,255,255,0.2);
}

/* SUB BAR WRAPPER */
.goal-wrap {
    flex: 1.5;
    text-align: center;
}

.bar-bg {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
    margin-top: 4px;
}

.bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f0ff, #00ff88);
    transition: width 0.5s ease;
}
</style>
</head>

<body>

<div class="bar-container">

    <div class="stat">
        <div class="label">VIEWERS</div>
        <div class="value" id="viewers">0</div>
    </div>

    <div class="divider"></div>

    <div class="stat">
        <div class="label">PEAK</div>
        <div class="value" id="peak">0</div>
    </div>

    <div class="divider"></div>

    <div class="stat">
        <div class="label">SUBS</div>
        <div class="value" id="subs">0</div>
    </div>

    <div class="divider"></div>

    <div class="goal-wrap">
        <div class="label">SUB GOAL (10,000)</div>
        <div class="bar-bg">
            <div class="bar-fill" id="bar"></div>
        </div>
    </div>

</div>

<script>
let peak = 0;
const goal = 10000;

async function updateStats() {
    const res = await fetch("https://crowrulestv.x10.mx/youtube-stats.php");
    const data = await res.json();

    document.getElementById("viewers").innerText = data.viewers;
    document.getElementById("subs").innerText = data.subs;

    if (data.viewers > peak) {
        peak = data.viewers;
        document.getElementById("peak").innerText = peak;
    }

    let percent = (data.subs / goal) * 100;
    if (percent > 100) percent = 100;

    document.getElementById("bar").style.width = percent + "%";
}

setInterval(updateStats, 3000);
updateStats();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CrowRules Live HUD V3 Always-On</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root{
    --neon:#00f0ff;
    --bg:rgba(0,0,0,0.7);
}

body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:Orbitron, sans-serif;
}

/* HUD CONTAINER */
#hud{
    position:absolute;
    bottom:25px;
    left:50%;
    transform:translateX(-50%);
    width:1000px;
    height:72px;

    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:12px 26px;

    background:var(--bg);
    border:1px solid rgba(0,240,255,0.7);
    border-radius:16px;

    box-shadow:0 0 28px rgba(0,240,255,0.2);
    backdrop-filter:blur(8px);

    color:white;
}

/* DIM MODE */
.dim{
    opacity:0.55;
}

/* BLOCKS */
.block{
    flex:1;
    text-align:center;
}

.label{
    font-size:10px;
    opacity:0.6;
    letter-spacing:1.5px;
}

.value{
    font-size:21px;
    font-weight:800;
    color:var(--neon);
    transition:transform .2s ease, text-shadow .2s ease;
}

/* FLASH EFFECT */
.flash{
    transform:scale(1.15);
    text-shadow:0 0 18px var(--neon);
}

/* DIVIDER */
.divider{
    width:1px;
    height:42px;
    background:rgba(255,255,255,0.15);
}

/* GOAL */
.goal{
    flex:1.5;
    text-align:center;
}

.bar{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.08);
    border-radius:6px;
    overflow:hidden;
    margin-top:6px;
}

.fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00f0ff,#00ff88);
    transition:width .5s ease;
    box-shadow:0 0 12px rgba(0,255,200,0.4);
}

/* STATUS */
#status{
    position:absolute;
    top:6px;
    right:12px;
    font-size:9px;
    opacity:0.5;
}
</style>
</head>

<body>

<div id="hud">

    <div class="block">
        <div class="label">VIEWERS</div>
        <div class="value" id="viewers">0</div>
    </div>

    <div class="divider"></div>

    <div class="block">
        <div class="label">PEAK</div>
        <div class="value" id="peak">0</div>
    </div>

    <div class="divider"></div>

    <div class="block">
        <div class="label">SUBS</div>
        <div class="value" id="subs">0</div>
    </div>

    <div class="divider"></div>

    <div class="goal">
        <div class="label">SUB GOAL (1,000)</div>
        <div class="bar">
            <div class="fill" id="bar"></div>
        </div>
    </div>

</div>

<div id="status">LIVE</div>

<script>
/* =========================
   CONFIG
========================= */
const CONFIG = {
    api: "https://crowrulestv.x10.mx/youtube-stats.php",
    goal: 1000,
    interval: 2500,
    cacheKey: "crowrules_hud_cache"
};

/* =========================
   STATE
========================= */
let state = {
    viewers: 0,
    peak: 0,
    subs: 0,
    online: true
};

/* =========================
   ELEMENTS
========================= */
const el = {
    hud: document.getElementById("hud"),
    viewers: document.getElementById("viewers"),
    peak: document.getElementById("peak"),
    subs: document.getElementById("subs"),
    bar: document.getElementById("bar"),
    status: document.getElementById("status")
};

/* =========================
   CACHE SYSTEM (CRITICAL FIX)
========================= */
function loadCache(){
    const saved = localStorage.getItem(CONFIG.cacheKey);
    if(saved){
        state = {...state, ...JSON.parse(saved)};
    }

    renderStatic();
}

function saveCache(){
    localStorage.setItem(CONFIG.cacheKey, JSON.stringify({
        subs: state.subs,
        peak: state.peak
    }));
}

/* =========================
   RENDER (ALWAYS ON)
========================= */
function renderStatic(){

    el.subs.innerText = state.subs;
    el.peak.innerText = state.peak;

    let percent = (state.subs / CONFIG.goal) * 100;
    el.bar.style.width = Math.min(percent, 100) + "%";
}

/* =========================
   FLASH EFFECT
========================= */
function flash(id){
    const node = document.getElementById(id);
    node.classList.remove("flash");
    void node.offsetWidth;
    node.classList.add("flash");
}

/* =========================
   FETCH DATA
========================= */
async function fetchStats(){
    try{
        const res = await fetch(CONFIG.api);
        const data = await res.json();

        state.online = true;
        el.status.innerText = "LIVE";
        el.status.style.color = "#00f0ff";

        /* VIEWERS */
        if(data.viewers !== state.viewers){
            el.viewers.innerText = data.viewers;
            flash("viewers");
            state.viewers = data.viewers;
        }

        /* SUBS (ALWAYS UPDATE) */
        if(data.subs !== undefined){
            state.subs = data.subs;
            el.subs.innerText = state.subs;
        }

        /* PEAK (ALWAYS TRACK) */
        if(data.viewers > state.peak){
            state.peak = data.viewers;
            el.peak.innerText = state.peak;
            flash("peak");
        }

        /* SUB GOAL ALWAYS ACTIVE */
        let percent = (state.subs / CONFIG.goal) * 100;
        el.bar.style.width = Math.min(percent, 100) + "%";

        saveCache();

    }catch(err){
        state.online = false;

        el.status.innerText = "OFFLINE";
        el.status.style.color = "#ff4d4d";

        /* IMPORTANT: NEVER BLANK SUBS OR GOAL */
        renderStatic();
    }
}

/* =========================
   IDLE EFFECT (OPTIONAL DIM)
========================= */
function checkIdle(){
    const idle = !state.online;
    el.hud.classList.toggle("dim", idle);
}

/* =========================
   INIT
========================= */
loadCache();

fetchStats();
setInterval(fetchStats, CONFIG.interval);
setInterval(checkIdle, 3000);
</script>

</body>
</html>

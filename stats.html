<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>YouTube Live Overlay Bar</title>

<style>
    body {
        margin: 0;
        background: transparent;
        overflow: hidden;
        font-family: Arial, sans-serif;
    }

    .bar {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 10px;
        padding: 10px;
        background: rgba(0,0,0,0.35);
        border-radius: 14px;
        backdrop-filter: blur(10px);
    }

    .box {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px 12px;
        background: rgba(20,20,20,0.75);
        border-radius: 10px;
        color: white;
        font-size: 13px;
        white-space: nowrap;
        border: 1px solid rgba(255,255,255,0.08);
    }

    .icon {
        opacity: 0.8;
    }

    .live {
        background: rgba(200,0,0,0.75);
        font-weight: bold;
    }

    .grow {
        color: #00ffcc;
    }
</style>
</head>

<body>

<div class="bar">
    <div class="box live">🔴 LIVE</div>
    <div class="box">👁 <span id="viewers">0</span></div>
    <div class="box">📈 Peak <span id="peak">0</span></div>
    <div class="box">⭐ Subs <span id="subs">0</span></div>
    <div class="box">🎯 Goal <span id="goal">1000</span></div>
    <div class="box">👍 <span id="likes">0</span></div>
    <div class="box">🎬 <span id="title">Loading...</span></div>
</div>

<script>
const API_KEY = "AIzaSyArQ6fqOxl8jenWZME2z1qwhd8qBNPD0KI";
const CHANNEL_ID = "UCOSm_4z9LIQUWHOc8yzPgkw";
const SUB_GOAL = 1000;

let peakViewers = 0;

document.getElementById("goal").innerText = SUB_GOAL;

// Fetch live data
async function fetchData() {
    try {
        // Get channel stats
        const channelRes = await fetch(
            `https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${CHANNEL_ID}&key=${API_KEY}`
        );
        const channelData = await channelRes.json();

        const subs = channelData.items[0].statistics.subscriberCount;
        document.getElementById("subs").innerText = Number(subs).toLocaleString();

        // Get live stream
        const searchRes = await fetch(
            `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
        );
        const searchData = await searchRes.json();

        if (!searchData.items.length) return;

        const videoId = searchData.items[0].id.videoId;
        const title = searchData.items[0].snippet.title;

        document.getElementById("title").innerText = title;

        // Get live stats
        const videoRes = await fetch(
            `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails,statistics&id=${videoId}&key=${API_KEY}`
        );
        const videoData = await videoRes.json();

        const stats = videoData.items[0].statistics;
        const live = videoData.items[0].liveStreamingDetails;

        const viewers = live.concurrentViewers || 0;
        const likes = stats.likeCount || 0;

        document.getElementById("viewers").innerText = Number(viewers).toLocaleString();
        document.getElementById("likes").innerText = Number(likes).toLocaleString();

        // Peak viewer tracking (local session)
        if (viewers > peakViewers) {
            peakViewers = viewers;
            document.getElementById("peak").innerText = peakViewers.toLocaleString();
        }

    } catch (err) {
        console.error("API Error:", err);
    }
}

// refresh loop
fetchData();
setInterval(fetchData, 10000);
</script>

</body>
</html>

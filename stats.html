<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CrowRules Entertainment Dashboard V2</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:rgba(0,0,0,.55);
    --border:rgba(255,255,255,.12);
    --live:#00ff88;
    --offline:#ff5555;
    --subs:#00d9ff;
    --goal:#ffb300;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

#dashboard{
    position:absolute;
    top:15px;
    right:15px;

    display:flex;
    align-items:center;
    gap:12px;
}

.panel{
    background:var(--bg);
    border:1px solid var(--border);

    backdrop-filter:blur(20px);

    border-radius:18px;

    padding:10px 14px;

    display:flex;
    align-items:center;
    gap:8px;

    box-shadow:
    0 0 20px rgba(0,217,255,.15);
}

.label{
    color:#999;
    font-size:9px;
    letter-spacing:1px;
}

.value{
    font-size:14px;
    font-weight:700;
    color:var(--text);
}

.live{
    color:var(--live);
}

.subs{
    color:var(--subs);
}

.goal{
    color:var(--goal);
}

#avatar{
    width:48px;
    height:48px;

    border-radius:50%;

    border:2px solid var(--subs);

    box-shadow:
    0 0 20px rgba(0,217,255,.4);
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;

    animation:pulse 1.5s infinite;
}

.online{
    background:var(--live);
}

.offline{
    background:var(--offline);
}

@keyframes pulse{

    0%,100%{
        opacity:1;
    }

    50%{
        opacity:.25;
    }

}

.goal-wrap{

    width:120px;
    height:8px;

    background:
    rgba(255,255,255,.08);

    border-radius:999px;

    overflow:hidden;
}

.goal-bar{

    width:0%;
    height:100%;

    background:
    linear-gradient(
        90deg,
        #00d9ff,
        #00ff88
    );

    transition:width .8s ease;
}

#streamTitle{

    max-width:300px;

    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

#statusBox{
    color:#ccc;
    font-size:10px;
}

</style>
</head>
<body>

<div id="dashboard">

    <img id="avatar" src="">

    <div class="status-dot offline" id="dot"></div>

    <div class="panel">
        <span class="label">LIVE</span>
        <span class="value live" id="liveStatus">OFFLINE</span>
    </div>

    <div class="panel">
        <span class="label">SUBS</span>
        <span class="value subs" id="subs">0</span>
    </div>

    <div class="panel">
        <span class="label">GOAL</span>
        <span class="value goal" id="goalRemaining">1000 LEFT</span>
    </div>

    <div class="goal-wrap">
        <div class="goal-bar" id="goalBar"></div>
    </div>

    <div class="panel">
        <span class="label">STREAM</span>
        <span class="value" id="streamTitle">
            Waiting...
        </span>
    </div>

    <div class="panel">
        <div id="statusBox">
            UPDATED:
            <span id="updated">--:--:--</span>
        </div>
    </div>

</div>

<script>

const API_KEY =
"AIzaSyAZ1zjGhtj4pA_hDVsQQzKXnUrcDAkDoWI";

const CHANNEL_ID =
"UCOSm_4z9LIQUWHOc8yzPgkw";

const SUB_GOAL = 1000;

const REFRESH = 30000;

function animateNumber(element,target){

    const start =
    Number(element.dataset.value || 0);

    const duration = 700;

    const startTime =
    performance.now();

    function frame(now){

        const progress =
        Math.min(
            (now-startTime)/duration,
            1
        );

        const value =
        Math.floor(
            start +
            (target-start)*progress
        );

        element.textContent =
        value.toLocaleString();

        if(progress < 1){

            requestAnimationFrame(frame);

        }else{

            element.dataset.value =
            target;

        }

    }

    requestAnimationFrame(frame);

}

async function getChannelData(){

    const response =
    await fetch(
`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${CHANNEL_ID}&key=${API_KEY}`
    );

    return await response.json();

}

async function getLiveData(){

    const response =
    await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
    );

    return await response.json();

}

async function refreshDashboard(){

    try{

        const channel =
        await getChannelData();

        if(!channel.items?.length)
            return;

        const info =
        channel.items[0];

        const subscribers =
        Number(
            info.statistics.subscriberCount
        );

        animateNumber(
            document.getElementById("subs"),
            subscribers
        );

        document.getElementById("avatar").src =
        info.snippet.thumbnails.default.url;

        const remaining =
        Math.max(
            SUB_GOAL-subscribers,
            0
        );

        document.getElementById(
            "goalRemaining"
        ).textContent =
        remaining.toLocaleString()
        +" LEFT";

        const percent =
        Math.min(
            subscribers/SUB_GOAL*100,
            100
        );

        document.getElementById(
            "goalBar"
        ).style.width =
        percent+"%";

        const live =
        await getLiveData();

        const isLive =
        live.items &&
        live.items.length > 0;

        const dot =
        document.getElementById("dot");

        const status =
        document.getElementById(
            "liveStatus"
        );

        if(isLive){

            dot.className =
            "status-dot online";

            status.textContent =
            "LIVE";

            document.getElementById(
                "streamTitle"
            ).textContent =
            live.items[0]
            .snippet.title;

        }else{

            dot.className =
            "status-dot offline";

            status.textContent =
            "OFFLINE";

            document.getElementById(
                "streamTitle"
            ).textContent =
            "No Active Stream";

        }

        document.getElementById(
            "updated"
        ).textContent =
        new Date()
        .toLocaleTimeString();

    }
    catch(error){

        console.error(error);

    }

}

refreshDashboard();

setInterval(
    refreshDashboard,
    REFRESH
);

</script>

</body>
</html>

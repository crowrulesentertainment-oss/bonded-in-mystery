<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Entertainment Dashboard V6</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:rgba(0,0,0,0.88);
    --panel:rgba(10,10,12,0.88);
    --border:rgba(255,255,255,0.10);

    --live:#00ff88;
    --offline:#ff4d4d;
    --subs:#00e5ff;
    --goal:#ffcc66;
    --text:#ffffff;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

/* MAIN DASHBOARD */
#dashboard{
    position:absolute;
    top:15px;
    right:15px;

    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;

    padding:6px;
    border-radius:14px;

    background:rgba(0,0,0,0.25);
}

/* DARK READABLE BUTTON PANELS */
.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;

    padding:8px 12px;

    display:flex;
    align-items:center;
    gap:6px;

    box-shadow:
        0 6px 18px rgba(0,0,0,0.65),
        inset 0 0 0 1px rgba(255,255,255,0.03);
}

/* TEXT */
.label{
    font-size:9px;
    letter-spacing:1px;
    color:#cfcfcf;
    opacity:0.9;
}

.value{
    font-size:13px;
    font-weight:800;
    color:var(--text);
    text-shadow:0 2px 6px rgba(0,0,0,0.85);
}

/* COLORS */
.subs{
    color:var(--subs);
    text-shadow:0 0 6px rgba(0,229,255,0.25);
}

.goal{
    color:var(--goal);
    text-shadow:0 0 6px rgba(255,204,102,0.25);
}

.live{
    color:var(--live);
    text-shadow:0 0 6px rgba(0,255,136,0.25);
}

/* AVATAR */
#avatar{
    width:44px;
    height:44px;
    border-radius:50%;
    border:2px solid var(--subs);
    box-shadow:0 0 10px rgba(0,229,255,0.25);
}

/* STATUS DOT */
.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

.online{
    background:var(--live);
    box-shadow:0 0 10px rgba(0,255,136,0.5);
}

.offline{
    background:var(--offline);
    box-shadow:0 0 10px rgba(255,77,77,0.35);
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:0.25;}
}

/* GOAL BAR */
.goal-wrap{
    width:120px;
    height:7px;
    background:rgba(0,0,0,0.65);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:999px;
    overflow:hidden;
}

.goal-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00e5ff,#00ff88);
    box-shadow:0 0 10px rgba(0,255,136,0.25);
    transition:width 0.5s ease;
}

/* STREAM TITLE */
#streamTitle{
    max-width:260px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* ERROR */
#error{
    position:absolute;
    bottom:-20px;
    right:0;
    font-size:10px;
    color:#ff4d4d;
    display:none;
}

</style>
</head>

<body>

<div id="dashboard">

    <img id="avatar" src="">

    <div class="status-dot offline" id="dot"></div>

    <div class="panel">
        <span class="label">LIVE</span>
        <span class="value live" id="liveStatus">OFFLINE</span>
    </div>

    <div class="panel">
        <span class="label">SUBS</span>
        <span class="value subs" id="subs">0</span>
    </div>

    <div class="panel">
        <span class="label">GOAL</span>
        <span class="value goal" id="goalText">0 LEFT</span>
    </div>

    <div class="goal-wrap">
        <div class="goal-bar" id="goalBar"></div>
    </div>

    <div class="panel">
        <span class="label">VIEWERS</span>
        <span class="value" id="viewers">0</span>
    </div>

    <div class="panel">
        <span class="label">PEAK</span>
        <span class="value" id="peakViewers">0</span>
    </div>

    <div class="panel">
        <span class="label">STREAM</span>
        <span class="value" id="streamTitle">Waiting...</span>
    </div>

</div>

<div id="error">API error (using cached data)</div>

<script>

/* =========================
   CONFIG
========================= */

const CONFIG = {
    API_KEY: "AIzaSyAZ1zjGhtj4pA_hDVsQQzKXnUrcDAkDoWI",
    CHANNEL_ID: "UCOSm_4z9LIQUWHOc8yzPgkw",
    SUB_GOAL: 1000,
    REFRESH: 30000
};

/* =========================
   STATE (NO BLANK UI EVER)
========================= */

let cache = {
    subs: 0
};

let viewerStats = {
    current: 0,
    peak: Number(localStorage.getItem("peakViewers") || 0)
};

/* =========================
   API
========================= */

async function fetchChannel(){
    return fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${CONFIG.CHANNEL_ID}&key=${CONFIG.API_KEY}`
    ).then(r => r.json());
}

async function fetchLive(){
    return fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CONFIG.CHANNEL_ID}&eventType=live&type=video&key=${CONFIG.API_KEY}`
    ).then(r => r.json());
}

/* =========================
   SAFE RENDER
========================= */

function setSubs(subs){
    document.getElementById("subs").textContent =
        subs.toLocaleString();
    cache.subs = subs;
}

function setGoal(subs){
    const remaining = Math.max(CONFIG.SUB_GOAL - subs, 0);

    document.getElementById("goalText").textContent =
        `${remaining.toLocaleString()} LEFT`;

    const percent = Math.min((subs / CONFIG.SUB_GOAL) * 100, 100);

    document.getElementById("goalBar").style.width =
        percent + "%";
}

/* =========================
   MAIN LOOP
========================= */

async function update(){

    const errorBox = document.getElementById("error");

    try{
        errorBox.style.display = "none";

        const [channel, live] = await Promise.all([
            fetchChannel(),
            fetchLive()
        ]);

        const info = channel?.items?.[0];

        /* SUBS (ALWAYS SAFE) */
        const subs = Number(info?.statistics?.subscriberCount ?? cache.subs);
        setSubs(subs);
        setGoal(subs);

        /* AVATAR */
        const avatar = info?.snippet?.thumbnails?.default?.url;
        if(avatar) document.getElementById("avatar").src = avatar;

        /* LIVE STATE */
        const isLive = (live?.items?.length ?? 0) > 0;

        const dot = document.getElementById("dot");
        const status = document.getElementById("liveStatus");

        if(isLive){
            dot.className = "status-dot online";
            status.textContent = "LIVE";
            document.getElementById("streamTitle").textContent =
                live.items[0].snippet.title;
        }else{
            dot.className = "status-dot offline";
            status.textContent = "OFFLINE";
            document.getElementById("streamTitle").textContent =
                "No Active Stream";
        }

        /* VIEWERS (LIVE ONLY) */
        const liveItem = live?.items?.[0];

        const currentViewers = Number(
            liveItem?.liveStreamingDetails?.concurrentViewers ??
            viewerStats.current
        );

        viewerStats.current = currentViewers;
        document.getElementById("viewers").textContent =
            viewerStats.current.toLocaleString();

        /* PEAK VIEWERS */
        if(currentViewers > viewerStats.peak){
            viewerStats.peak = currentViewers;
            localStorage.setItem("peakViewers", viewerStats.peak);
        }

        document.getElementById("peakViewers").textContent =
            viewerStats.peak.toLocaleString();

    }catch(err){
        console.error(err);
        errorBox.style.display = "block";

        /* SAFE FALLBACK */
        setSubs(cache.subs);
        setGoal(cache.subs);

        document.getElementById("viewers").textContent =
            viewerStats.current.toLocaleString();

        document.getElementById("peakViewers").textContent =
            viewerStats.peak.toLocaleString();
    }
}

/* START */
update();
setInterval(update, CONFIG.REFRESH);

</script>

</body>
</html>

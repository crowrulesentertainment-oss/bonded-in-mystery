<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CrowRules Entertainment - Broadcast Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:rgba(0,0,0,.85);
    --border:rgba(255,255,255,.12);
    --live:#00ff88;
    --offline:#ff5555;
    --subs:#00d9ff;
    --peak:#ffb300;
    --goal:#ff5f7a;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

#dashboard{
    position:absolute;
    top:15px;
    right:15px;

    display:flex;
    align-items:center;
    gap:10px;
}

/* STATUS */

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    background:#777;
    animation:pulse 1.6s infinite;
}

.status-dot.live{
    background:var(--live);
}

.status-dot.offline{
    background:var(--offline);
}

.status-dot.error{
    background:#999;
}

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.25}
}

/* PANELS */

.panel{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:999px;
    padding:7px 12px;

    display:flex;
    align-items:baseline;
    gap:6px;

    backdrop-filter:blur(12px);
}

.label{
    font-size:9px;
    color:#999;
    letter-spacing:1px;
}

.value{
    font-size:13px;
    font-weight:700;
}

.live-value{
    color:var(--live);
}

.peak-value{
    color:var(--peak);
}

.sub-value{
    color:var(--subs);
}

.goal-value{
    color:var(--goal);
}

/* PROGRESS */

.goal-wrap{
    width:90px;
    height:6px;
    overflow:hidden;
    border-radius:999px;
    background:rgba(255,255,255,.08);
    border:1px solid var(--border);
}

.goal-bar{
    width:0%;
    height:100%;
    background:var(--subs);
    transition:width .8s ease;
}

/* STATUS BOX */

#statusBox{
    background:var(--bg);
    border:1px solid var(--border);
    border-radius:999px;
    padding:7px 12px;

    font-size:10px;
    color:#ccc;
}

#updated{
    opacity:.7;
}

</style>
</head>
<body>

<div id="dashboard">

    <div id="dot" class="status-dot"></div>

    <div class="panel">
        <span class="label">LIVE</span>
        <span id="live" class="value live-value">0</span>
    </div>

    <div class="panel">
        <span class="label">PEAK</span>
        <span id="peak" class="value peak-value">0</span>
    </div>

    <div class="panel">
        <span class="label">SUBS</span>
        <span id="subs" class="value sub-value">0</span>
    </div>

    <div class="panel">
        <span class="label">GOAL</span>
        <span id="goalText" class="value goal-value">1000</span>
    </div>

    <div class="goal-wrap">
        <div id="goalBar" class="goal-bar"></div>
    </div>

    <div id="statusBox">
        <span id="status">CONNECTING</span>
        |
        <span id="updated">--:--:--</span>
    </div>

</div>

<script>

const API_URL =
"https://bonded-in-mystery.infinityfree.me/youtube-stats.php";

const GOAL = 1000;
const REFRESH = 10000;

let lastData = {};
let busy = false;

/* ANIMATION */

function animateNumber(element, target){

    const start = Number(element.dataset.value || 0);
    const duration = 600;
    const startTime = performance.now();

    function frame(now){

        const progress =
            Math.min((now - startTime) / duration, 1);

        const current =
            Math.floor(start + ((target - start) * progress));

        element.textContent =
            current.toLocaleString();

        if(progress < 1){
            requestAnimationFrame(frame);
        }else{
            element.dataset.value = target;
        }
    }

    requestAnimationFrame(frame);
}

/* STATUS */

function setStatus(type,text){

    const dot = document.getElementById("dot");

    dot.className = "status-dot";
    dot.classList.add(type);

    document.getElementById("status").textContent = text;
}

/* FETCH */

async function fetchStats(){

    if(busy) return null;

    busy = true;

    try{

        const response = await fetch(
            API_URL + "?t=" + Date.now(),
            {
                cache:"no-store"
            }
        );

        const raw = await response.text();

        if(!raw.trim().startsWith("{")){
            throw new Error("Invalid JSON");
        }

        const json = JSON.parse(raw);

        busy = false;

        return json;

    }catch(error){

        console.error(error);

        busy = false;

        return null;
    }
}

/* APPLY */

function updateUI(data){

    if(!data){

        setStatus("error","ERROR");

        return;
    }

    animateNumber(
        document.getElementById("live"),
        data.liveViewers || 0
    );

    animateNumber(
        document.getElementById("peak"),
        data.peakViewers || 0
    );

    animateNumber(
        document.getElementById("subs"),
        data.subscribers || 0
    );

    const percent =
        Math.min(
            ((data.subscribers || 0) / GOAL) * 100,
            100
        );

    document.getElementById("goalBar").style.width =
        percent + "%";

    document.getElementById("goalText").textContent =
        GOAL.toLocaleString();

    if(data.isLive){
        setStatus("live","LIVE");
    }else{
        setStatus("offline","OFFLINE");
    }

    document.getElementById("updated").textContent =
        new Date().toLocaleTimeString();

    lastData = data;
}

/* LOOP */

async function refresh(){

    const data = await fetchStats();

    updateUI(data);
}

refresh();
setInterval(refresh, REFRESH);

</script>

</body>
</html>

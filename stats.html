<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Broadcast Pro Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    overflow:hidden;
    background:transparent;
    font-family:'Orbitron',sans-serif;
}

/* =========================
   MAIN BAR
========================= */
#bar{
    position:absolute;
    top:10px;
    right:10px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* =========================
   STATUS DOT SYSTEM
========================= */
.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#888;
    animation:pulse 1.5s infinite;
}

.dot.live{ background:#00ff88; }
.dot.off{ background:#ff4444; }
.dot.error{ background:#999; }

@keyframes pulse{
    0%,100%{opacity:1}
    50%{opacity:.25}
}

/* =========================
   BLOCKS
========================= */
.block{
    display:flex;
    align-items:baseline;
    gap:5px;
    padding:6px 10px;
    background:rgba(0,0,0,0.88);
    border:1px solid rgba(255,255,255,0.10);
    border-radius:999px;
    backdrop-filter: blur(10px);
}

.label{ font-size:9px; color:#aaa; letter-spacing:1px; }
.value{ font-size:13px; font-weight:700; }

.viewers{color:#00ff88;}
.peak{color:#ffb300;}
.subs{color:#00e5ff;}
.goal{color:#ff5f7a;}

.divider{
    width:1px;
    height:16px;
    background:rgba(255,255,255,0.15);
}

/* =========================
   STATUS TEXT
========================= */
#status{
    font-size:9px;
    color:#888;
    padding:6px 8px;
    background:rgba(0,0,0,0.75);
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.10);
}

/* =========================
   GLASS SHIMMER (PRO FEEL)
========================= */
.block::after{
    content:"";
    position:absolute;
}

</style>
</head>

<body>

<div id="bar">

    <div class="dot" id="dot"></div>

    <div class="block">
        <span class="label">LIVE</span>
        <span class="value" id="live">0</span>
    </div>

    <div class="divider"></div>

    <div class="block">
        <span class="label">PEAK</span>
        <span class="value" id="peak">0</span>
    </div>

    <div class="divider"></div>

    <div class="block">
        <span class="label">SUBS</span>
        <span class="value" id="subs">0</span>
    </div>

    <div class="divider"></div>

    <div class="block">
        <span class="label">GOAL</span>
        <span class="value goal" id="goal">1000</span>
    </div>

    <div id="status">SYNCING</div>

</div>

<script>

const STATS_API =
"https://bonded-in-mystery.infinityfree.me/youtube-stats.php";

const REFRESH_RATE = 7000;

let last = {};
let isRunning = false;

/* =========================
   ULTRA SMOOTH TWEEN ENGINE
========================= */
function smooth(el, to){

    let from = parseFloat(el.dataset.v || 0);
    let start = performance.now();

    function step(t){

        let p = Math.min((t - start) / 500, 1);
        let val = from + (to - from) * p;

        el.textContent = Math.floor(val).toLocaleString();

        if(p < 1){
            requestAnimationFrame(step);
        } else {
            el.dataset.v = to;
        }
    }

    requestAnimationFrame(step);
}

/* =========================
   FETCH SAFE (NO OVERLAP)
========================= */
async function getData(){

    if(isRunning) return null;
    isRunning = true;

    try{
        const res = await fetch(STATS_API + "?t=" + Date.now(), {
            cache: "no-store"
        });

        const json = await res.json();
        isRunning = false;
        return json;

    } catch(e){
        isRunning = false;
        return null;
    }
}

/* =========================
   APPLY STATS
========================= */
function apply(data){

    if(!data){
        document.getElementById("status").textContent = "ERROR";
        return;
    }

    if(data.liveViewers !== last.liveViewers){
        smooth(document.getElementById("live"), data.liveViewers || 0);
    }

    if(data.peakViewers !== last.peakViewers){
        smooth(document.getElementById("peak"), data.peakViewers || 0);
    }

    if(data.subscribers !== last.subscribers){
        smooth(document.getElementById("subs"), data.subscribers || 0);
    }

    last = data;
}

/* =========================
   STATE ENGINE
========================= */
function state(data){

    const dot = document.getElementById("dot");
    const status = document.getElementById("status");

    dot.className = "dot";

    if(!data){
        dot.classList.add("error");
        status.textContent = "ERROR";
        return;
    }

    if(data.isLive){
        dot.classList.add("live");
        status.textContent = "LIVE BROADCAST";
    } else {
        dot.classList.add("off");
        status.textContent = "OFFLINE";
    }
}

/* =========================
   MAIN LOOP ENGINE
========================= */
async function loop(){

    const data = await getData();

    apply(data);
    state(data);

}

loop();
setInterval(loop, REFRESH_RATE);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Entertainment Dashboard V3</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:rgba(0,0,0,.55);
    --border:rgba(255,255,255,.12);
    --live:#00ff88;
    --offline:#ff5555;
    --subs:#00d9ff;
    --goal:#ffb300;
    --text:#ffffff;
    --glow:rgba(0,255,136,.35);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

/* MAIN WRAP */
#dashboard{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    align-items:center;
    gap:10px;
}

/* PANELS */
.panel{
    background:var(--bg);
    border:1px solid var(--border);
    backdrop-filter:blur(18px);
    border-radius:16px;
    padding:8px 12px;
    display:flex;
    align-items:center;
    gap:6px;
    box-shadow:0 0 18px rgba(0,217,255,.10);
}

.label{
    color:#888;
    font-size:9px;
    letter-spacing:1px;
}

.value{
    font-size:13px;
    font-weight:700;
    color:var(--text);
}

/* LIVE STATES */
.live{color:var(--live);}
.subs{color:var(--subs);}
.goal{color:var(--goal);}

#avatar{
    width:44px;
    height:44px;
    border-radius:50%;
    border:2px solid var(--subs);
    box-shadow:0 0 18px rgba(0,217,255,.3);
}

/* STATUS DOT */
.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    animation:pulse 1.6s infinite;
}

.online{
    background:var(--live);
    box-shadow:0 0 12px var(--glow);
}

.offline{
    background:var(--offline);
}

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.25;}
}

/* GOAL BAR */
.goal-wrap{
    width:120px;
    height:7px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
}

.goal-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00d9ff,#00ff88);
    transition:width .6s ease;
}

/* STREAM TITLE */
#streamTitle{
    max-width:260px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

/* UPTIME */
#uptime{
    font-size:10px;
    color:#aaa;
}

/* ERROR STATE */
#error{
    position:absolute;
    bottom:-22px;
    right:0;
    font-size:10px;
    color:#ff5555;
    display:none;
}

</style>
</head>

<body>

<div id="dashboard">

    <div class="status-dot offline" id="dot"></div>

    <div class="panel">
        <span class="label">LIVE</span>
        <span class="value live" id="liveStatus">OFFLINE</span>
    </div>

    <div class="panel">
        <span class="label">SUBS</span>
        <span class="value subs" id="subs">0</span>
    </div>

    <div class="panel">
        <span class="label">GOAL</span>
        <span class="value goal" id="goalRemaining">--</span>
    </div>

    <div class="goal-wrap">
        <div class="goal-bar" id="goalBar"></div>
    </div>

    <div class="panel">
        <span class="label">STREAM</span>
        <span class="value" id="streamTitle">Waiting...</span>
    </div>

    <div class="panel">
        <span class="label">UPTIME</span>
        <span class="value" id="uptime">00:00:00</span>
    </div>

    <div class="panel">
        <span class="label">UPDATED</span>
        <span class="value" id="updated">--:--:--</span>
    </div>

    <div id="error">API error (retrying...)</div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const CONFIG = {
    API_KEY: "AIzaSyAZ1zjGhtj4pA_hDVsQQzKXnUrcDAkDoWI",
    CHANNEL_ID: "UCOSm_4z9LIQUWHOc8yzPgkw",
    SUB_GOAL: 1000,
    REFRESH: 30000,
    RETRY_DELAY: 5000
};

/* =========================
   STATE
========================= */

let lastSubs = 0;
let liveStartTime = null;
let retryTimeout = null;

/* =========================
   UTIL: ANIMATE NUMBER
========================= */

function animateNumber(el, target){
    const start = Number(el.dataset.value || 0);
    const duration = 600;
    const startTime = performance.now();

    function step(now){
        const p = Math.min((now - startTime) / duration, 1);
        const val = Math.floor(start + (target - start) * p);

        el.textContent = val.toLocaleString();

        if(p < 1) requestAnimationFrame(step);
        else el.dataset.value = target;
    }

    requestAnimationFrame(step);
}

/* =========================
   UPTIME TIMER
========================= */

function updateUptime(){
    if(!liveStartTime) return;

    const diff = Date.now() - liveStartTime;
    const sec = Math.floor(diff / 1000);

    const h = String(Math.floor(sec / 3600)).padStart(2,'0');
    const m = String(Math.floor((sec % 3600) / 60)).padStart(2,'0');
    const s = String(sec % 60).padStart(2,'0');

    document.getElementById("uptime").textContent =
        `${h}:${m}:${s}`;
}

/* =========================
   API CALLS
========================= */

async function getChannel(){
    return fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${CONFIG.CHANNEL_ID}&key=${CONFIG.API_KEY}`
    ).then(r => r.json());
}

async function getLive(){
    return fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CONFIG.CHANNEL_ID}&eventType=live&type=video&key=${CONFIG.API_KEY}`
    ).then(r => r.json());
}

/* =========================
   MAIN UPDATE LOOP
========================= */

async function refresh(){
    const errorBox = document.getElementById("error");

    try{
        errorBox.style.display = "none";

        const [channel, live] = await Promise.all([
            getChannel(),
            getLive()
        ]);

        const info = channel.items?.[0];
        if(!info) return;

        const subs = Number(info.statistics.subscriberCount || 0);

        animateNumber(document.getElementById("subs"), subs);

        /* avatar */
        document.getElementById("avatar").src =
            info.snippet.thumbnails.default.url;

        /* goal */
        const remaining = Math.max(CONFIG.SUB_GOAL - subs, 0);
        document.getElementById("goalRemaining").textContent =
            remaining.toLocaleString();

        const percent = Math.min((subs / CONFIG.SUB_GOAL) * 100, 100);
        document.getElementById("goalBar").style.width = percent + "%";

        /* LIVE STATE */
        const isLive = live.items?.length > 0;

        const dot = document.getElementById("dot");
        const status = document.getElementById("liveStatus");

        if(isLive){
            dot.className = "status-dot online";
            status.textContent = "LIVE";

            document.getElementById("streamTitle").textContent =
                live.items[0].snippet.title;

            if(!liveStartTime) liveStartTime = Date.now();
        }else{
            dot.className = "status-dot offline";
            status.textContent = "OFFLINE";
            document.getElementById("streamTitle").textContent = "No Active Stream";
            liveStartTime = null;
            document.getElementById("uptime").textContent = "00:00:00";
        }

        /* update tracking */
        lastSubs = subs;

        document.getElementById("updated").textContent =
            new Date().toLocaleTimeString();

    }catch(err){
        console.error(err);
        document.getElementById("error").style.display = "block";

        clearTimeout(retryTimeout);
        retryTimeout = setTimeout(refresh, CONFIG.RETRY_DELAY);
    }
}

/* =========================
   START
========================= */

refresh();
setInterval(refresh, CONFIG.REFRESH);
setInterval(updateUptime, 1000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Dashboard V13 (FIXED)</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
    --panel:rgba(10,10,12,0.92);
    --border:rgba(255,255,255,0.10);
    --live:#00ff88;
    --offline:#ff4d4d;
    --subs:#00e5ff;
    --goal:#ffcc66;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

#dashboard{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    gap:8px;
    flex-wrap:wrap;
}

.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;
    padding:8px 12px;
    color:white;
    font-size:13px;
    font-weight:800;
}

.label{
    font-size:9px;
    color:#aaa;
}

.subs{ color:var(--subs); }
.goal{ color:var(--goal); }

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
}

.online{ background:var(--live); }
.offline{ background:var(--offline); }

.goal-bar{
    width:120px;
    height:7px;
    background:#111;
    border-radius:999px;
    overflow:hidden;
}

.goal-fill{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00e5ff,#00ff88);
    transition:width 0.5s ease;
}

</style>
</head>

<body>

<div id="dashboard">

    <div class="status-dot offline" id="dot"></div>

    <div class="panel"><span class="label">LIVE</span> <span id="liveStatus">OFFLINE</span></div>

    <div class="panel"><span class="label">SUBS</span> <span class="subs" id="subs">0</span></div>

    <div class="panel"><span class="label">GOAL</span> <span class="goal" id="goalText">0 LEFT</span></div>

    <div class="goal-bar"><div class="goal-fill" id="goalBar"></div></div>

    <div class="panel"><span class="label">VIEWERS</span> <span id="viewers">0</span></div>

    <div class="panel"><span class="label">PEAK</span> <span id="peak">0</span></div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const API_KEY = window.YT_API_KEY || "";
const CHANNEL_ID = "UCOSm_4z9LIQUWHOc8yzPgkw";
const SUB_GOAL = 1000;
const REFRESH = 30000;

/* =========================
   STATE
========================= */

let cache = {
    subs: 0,
    videoId: null
};

let peak = Number(localStorage.getItem("peakViewers") || 0);

/* =========================
   SAFE FETCH
========================= */

async function fetchJSON(url){
    try{
        const res = await fetch(url);
        const data = await res.json();

        if(data?.error){
            console.warn("YT ERROR:", data.error.message);
            return null;
        }

        return data;
    }catch(e){
        console.warn("NETWORK ERROR:", e);
        return null;
    }
}

/* =========================
   CHANNEL (SUBS)
========================= */

async function getChannel(){

    const url =
        `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${CHANNEL_ID}&key=${API_KEY}`;

    return await fetchJSON(url);
}

/* =========================
   LIVE VIDEO FINDER
========================= */

async function getLiveVideoId(){

    const url =
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`;

    const data = await fetchJSON(url);

    const videoId = data?.items?.[0]?.id?.videoId || null;

    cache.videoId = videoId;

    return videoId;
}

/* =========================
   VIDEO DETAILS (VIEWERS)
========================= */

async function getVideoStats(videoId){

    if(!videoId) return null;

    const url =
        `https://www.googleapis.com/youtube/v3/videos?part=snippet,liveStreamingDetails&id=${videoId}&key=${API_KEY}`;

    return await fetchJSON(url);
}

/* =========================
   SUBS (ALWAYS SAFE)
========================= */

function renderSubs(channel){

    const apiSubs =
        Number(channel?.items?.[0]?.statistics?.subscriberCount);

    if(!isNaN(apiSubs) && apiSubs > 0){
        cache.subs = apiSubs;
    }

    document.getElementById("subs").textContent =
        cache.subs.toLocaleString();

    return cache.subs;
}

/* =========================
   GOAL
========================= */

function renderGoal(subs){

    const remaining = Math.max(SUB_GOAL - subs, 0);
    const percent = Math.min((subs / SUB_GOAL) * 100, 100);

    document.getElementById("goalText").textContent =
        `${remaining.toLocaleString()} LEFT`;

    document.getElementById("goalBar").style.width =
        percent + "%";
}

/* =========================
   LIVE STATUS
========================= */

function renderLive(isLive){

    document.getElementById("dot").className =
        "status-dot " + (isLive ? "online" : "offline");

    document.getElementById("liveStatus").textContent =
        isLive ? "LIVE" : "OFFLINE";
}

/* =========================
   VIEWERS + PEAK
========================= */

function renderViewers(video){

    const current =
        Number(video?.items?.[0]?.liveStreamingDetails?.concurrentViewers || 0);

    if(current > peak){
        peak = current;
        localStorage.setItem("peakViewers", peak);
    }

    document.getElementById("viewers").textContent =
        current.toLocaleString();

    document.getElementById("peak").textContent =
        peak.toLocaleString();
}

/* =========================
   MASTER LOOP
========================= */

async function update(){

    const channel = await getChannel();

    const subs = renderSubs(channel);
    renderGoal(subs);

    const videoId = await getLiveVideoId();

    const videoData = await getVideoStats(videoId);

    const isLive = !!videoId;

    renderLive(isLive);
    renderViewers(videoData);
}

/* START */
update();
setInterval(update, REFRESH);

</script>

</body>
</html>

<script>
const CONFIG = {
    apiKey: "AIzaSyArQ6fqOxl8jenWZME2z1qwhd8qBNPD0KI",
    channelId: "UCOSm_4z9LIQUWHOc8yzPgkw",
    goal: 1000,
    interval: 5000,
    cacheKey: "crowrules_hud_safe_v4"
};

/* STATE = ALWAYS FALLBACK SAFE */
let state = {
    viewers: 0,
    peak: 0,
    subs: 0,
    lastGoodSubs: 0,
    lastGoodViewers: 0,
    lastUpdate: Date.now()
};

/* ELEMENTS */
const el = {
    viewers: document.getElementById("viewers"),
    peak: document.getElementById("peak"),
    subs: document.getElementById("subs"),
    bar: document.getElementById("bar"),
    status: document.getElementById("status"),
    hud: document.getElementById("hud")
};

/* =========================
   CACHE SYSTEM (CRITICAL SAFETY)
========================= */
function loadCache(){
    const saved = localStorage.getItem(CONFIG.cacheKey);
    if(saved){
        state = {...state, ...JSON.parse(saved)};
    }
    render();
}

function saveCache(){
    localStorage.setItem(CONFIG.cacheKey, JSON.stringify(state));
}

/* =========================
   SAFE RENDER (NEVER BREAK UI)
========================= */
function render(){
    el.subs.innerText = state.subs;
    el.peak.innerText = state.peak;
    el.viewers.innerText = state.viewers;

    const percent = (state.subs / CONFIG.goal) * 100;
    el.bar.style.width = Math.min(percent, 100) + "%";
}

/* =========================
   SAFE FETCH WRAPPER
========================= */
async function safeFetch(url){
    try{
        const res = await fetch(url);
        if(!res.ok) throw new Error("Bad response");
        return await res.json();
    }catch(err){
        return null;
    }
}

/* =========================
   GET SUBSCRIBERS (SAFE)
========================= */
async function fetchSubs(){
    const url = `https://www.googleapis.com/youtube/v3/channels?part=statistics&id=${CONFIG.channelId}&key=${CONFIG.apiKey}`;

    const data = await safeFetch(url);

    if(data?.items?.[0]?.statistics?.subscriberCount){
        return parseInt(data.items[0].statistics.subscriberCount);
    }

    return null;
}

/* =========================
   GET LIVE VIEWERS (SAFE)
========================= */
async function fetchLiveViewers(){
    const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=id&channelId=${CONFIG.channelId}&eventType=live&type=video&key=${CONFIG.apiKey}`;

    const search = await safeFetch(searchUrl);

    const videoId = search?.items?.[0]?.id?.videoId;

    if(!videoId) return null;

    const videoUrl = `https://www.googleapis.com/youtube/v3/videos?part=liveStreamingDetails&id=${videoId}&key=${CONFIG.apiKey}`;

    const video = await safeFetch(videoUrl);

    const viewers = video?.items?.[0]?.liveStreamingDetails?.concurrentViewers;

    return viewers ? parseInt(viewers) : null;
}

/* =========================
   UPDATE ENGINE (FAILSAFE CORE)
========================= */
async function update(){
    el.status.innerText = "SYNCING";
    el.status.style.color = "#00d4ff";

    const [subs, viewers] = await Promise.all([
        fetchSubs(),
        fetchLiveViewers()
    ]);

    /* SUBSCRIBERS (CRITICAL: fallback safe) */
    if(subs !== null){
        state.subs = subs;
        state.lastGoodSubs = subs;
    } else {
        state.subs = state.lastGoodSubs;
    }

    /* VIEWERS (ONLY IF LIVE) */
    if(viewers !== null){
        state.viewers = viewers;
        state.lastGoodViewers = viewers;

        if(viewers > state.peak){
            state.peak = viewers;
        }

        el.status.innerText = "LIVE";
        el.status.style.color = "#00ff9d";
    } else {
        state.viewers = 0;
        el.status.innerText = "OFFLINE";
        el.status.style.color = "#ff4d4d";
    }

    state.lastUpdate = Date.now();

    render();
    saveCache();
}

/* =========================
   AUTO RECOVERY LOOP
========================= */
function recoveryCheck(){
    const stale = Date.now() - state.lastUpdate > 20000;

    if(stale){
        state.subs = state.lastGoodSubs;
        state.viewers = 0;
        el.status.innerText = "DEGRADED";
        el.status.style.color = "#ffb300";
        render();
    }
}

/* =========================
   INIT
========================= */
loadCache();
update();

setInterval(update, CONFIG.interval);
setInterval(recoveryCheck, 5000);
</script>

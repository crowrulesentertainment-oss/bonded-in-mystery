<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Dashboard V11</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:rgba(0,0,0,0.88);
    --panel:rgba(10,10,12,0.92);
    --border:rgba(255,255,255,0.10);

    --live:#00ff88;
    --offline:#ff4d4d;
    --subs:#00e5ff;
    --goal:#ffcc66;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

#dashboard{
    position:absolute;
    top:15px;
    right:15px;

    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:wrap;

    padding:6px;
    border-radius:14px;

    background:rgba(0,0,0,0.25);
}

/* PANELS */
.panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:12px;

    padding:8px 12px;

    display:flex;
    align-items:center;
    gap:6px;

    color:white;
    font-size:13px;
    font-weight:800;
}

.label{
    font-size:9px;
    color:#aaa;
    letter-spacing:1px;
}

.subs{ color:var(--subs); }
.goal{ color:var(--goal); }
.live{ color:var(--live); }

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
}

.online{ background:var(--live); }
.offline{ background:var(--offline); }

/* GOAL BAR */
.goal-wrap{
    width:120px;
    height:7px;
    background:#111;
    border-radius:999px;
    overflow:hidden;
}

.goal-bar{
    width:0%;
    height:100%;
    background:linear-gradient(90deg,#00e5ff,#00ff88);
    transition:width 0.5s ease;
}

</style>
</head>

<body>

<div id="dashboard">

    <div class="status-dot offline" id="dot"></div>

    <div class="panel"><span class="label">LIVE</span><span id="liveStatus">OFFLINE</span></div>

    <div class="panel"><span class="label">SUBS</span><span class="subs" id="subs">0</span></div>

    <div class="panel"><span class="label">GOAL</span><span class="goal" id="goalText">0 LEFT</span></div>

    <div class="goal-wrap"><div class="goal-bar" id="goalBar"></div></div>

    <div class="panel"><span class="label">VIEWERS</span><span id="viewers">0</span></div>

    <div class="panel"><span class="label">PEAK</span><span id="peakViewers">0</span></div>

    <div class="panel"><span class="label">STREAM</span><span id="streamTitle">Waiting...</span></div>

</div>

<script>

/* =========================
   CONFIG
========================= */

const API_KEY = window.YT_API_KEY || "";
const CHANNEL_ID = "UCOSm_4z9LIQUWHOc8yzPgkw";
const SUB_GOAL = 1000;
const REFRESH = 30000;

/* =========================
   STATE
========================= */

let cache = {
    lastSubs: 0
};

let viewerStats = {
    current: 0,
    peak: Number(localStorage.getItem("peakViewers") || 0)
};

/* =========================
   SAFE FETCH
========================= */

async function ytFetch(url){
    try{
        const res = await fetch(url);
        const data = await res.json();
        if(data?.error) throw new Error(data.error.message);
        return data;
    }catch(e){
        console.warn("API error:", e);
        return null;
    }
}

/* =========================
   API
========================= */

async function getChannel(){
    return ytFetch(
        `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${CHANNEL_ID}&key=${API_KEY}`
    );
}

async function getLive(){
    return ytFetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CHANNEL_ID}&eventType=live&type=video&key=${API_KEY}`
    );
}

/* =========================
   SUBS (ALWAYS SAFE)
========================= */

function renderSubs(channel){

    let subs = cache.lastSubs;

    const apiSubs = channel?.items?.[0]?.statistics?.subscriberCount;

    if(apiSubs !== undefined){
        subs = Number(apiSubs);
        cache.lastSubs = subs;
    }

    document.getElementById("subs").textContent =
        subs.toLocaleString();

    return subs;
}

/* =========================
   GOAL (ALWAYS INDEPENDENT)
========================= */

function renderGoal(subs){

    const remaining = Math.max(SUB_GOAL - subs, 0);
    const percent = Math.min((subs / SUB_GOAL) * 100, 100);

    document.getElementById("goalText").textContent =
        `${remaining.toLocaleString()} LEFT`;

    document.getElementById("goalBar").style.width =
        percent + "%";
}

/* =========================
   LIVE
========================= */

function renderLive(live){

    const isLive = (live?.items?.length ?? 0) > 0;

    document.getElementById("dot").className =
        "status-dot " + (isLive ? "online" : "offline");

    document.getElementById("liveStatus").textContent =
        isLive ? "LIVE" : "OFFLINE";

    document.getElementById("streamTitle").textContent =
        isLive ? live.items[0].snippet.title : "No Active Stream";

    return isLive;
}

/* =========================
   VIEWERS + PEAK
========================= */

function renderViewers(live){

    const liveItem = live?.items?.[0];

    const current = Number(
        liveItem?.liveStreamingDetails?.concurrentViewers ??
        viewerStats.current
    );

    viewerStats.current = current;

    document.getElementById("viewers").textContent =
        current.toLocaleString();

    if(current > viewerStats.peak){
        viewerStats.peak = current;
        localStorage.setItem("peakViewers", viewerStats.peak);
    }

    document.getElementById("peakViewers").textContent =
        viewerStats.peak.toLocaleString();
}

/* =========================
   MAIN LOOP
========================= */

async function update(){

    const [channel, live] = await Promise.all([
        getChannel(),
        getLive()
    ]);

    // 🔥 SUBS ALWAYS FIRST (NO DEPENDENCY ON LIVE)
    const subs = renderSubs(channel);
    renderGoal(subs);

    // 🔥 LIVE DOES NOT CONTROL SUBS
    renderLive(live);
    renderViewers(live);
}

/* START */
update();
setInterval(update, REFRESH);

</script>

</body>
</html>

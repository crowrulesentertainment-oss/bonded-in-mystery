<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Live Stats Overlay</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: transparent;
    overflow: hidden;
    font-family: Orbitron, sans-serif;
    color: #fff;
}

.overlay {
    position: absolute;
    bottom: 20px;
    left: 20px;
    width: 320px;
    padding: 15px;
    background: rgba(0,0,0,0.65);
    border: 1px solid #00f0ff;
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,240,255,0.4);
}

.stat {
    margin: 10px 0;
    font-size: 16px;
}

.label {
    font-size: 12px;
    opacity: 0.7;
}

.value {
    font-size: 20px;
    font-weight: 700;
    color: #00f0ff;
}

.bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 5px;
    overflow: hidden;
    margin-top: 5px;
}

.fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #00f0ff, #00ff88);
    transition: width 0.6s ease;
}
</style>
</head>

<body>

<div class="overlay">
    <div class="stat">
        <div class="label">LIVE VIEWERS</div>
        <div class="value" id="viewers">0</div>
    </div>

    <div class="stat">
        <div class="label">PEAK VIEWERS</div>
        <div class="value" id="peak">0</div>
    </div>

    <div class="stat">
        <div class="label">SUBSCRIBERS</div>
        <div class="value" id="subs">0</div>
    </div>

    <div class="stat">
        <div class="label">SUB GOAL (10,000)</div>
        <div class="bar">
            <div class="fill" id="bar"></div>
        </div>
    </div>
</div>

<script>
let peak = 0;
const goal = 10000;

async function updateStats() {
    const res = await fetch("https://crowrulestv.x10.mx/youtube-stats.php");
    const data = await res.json();

    document.getElementById("viewers").innerText = data.viewers;
    document.getElementById("subs").innerText = data.subs;

    // peak tracking
    if (data.viewers > peak) {
        peak = data.viewers;
        document.getElementById("peak").innerText = peak;
    }

    // subscriber goal bar
    let percent = (data.subs / goal) * 100;
    if (percent > 100) percent = 100;

    document.getElementById("bar").style.width = percent + "%";
}

setInterval(updateStats, 3000);
updateStats();
</script>

</body>
</html>

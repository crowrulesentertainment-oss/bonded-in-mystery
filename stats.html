<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrowRules Entertainment Dashboard V5</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
    --bg:rgba(0,0,0,.55);
    --border:rgba(255,255,255,.12);
    --live:#00ff88;
    --offline:#ff5555;
    --subs:#00d9ff;
    --goal:#ffb300;
    --text:#ffffff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:transparent;
    overflow:hidden;
    font-family:'Orbitron',sans-serif;
}

#dashboard{
    position:absolute;
    top:15px;
    right:15px;
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

/* PANELS */
.panel{
    background:var(--bg);
    border:1px solid var(--border);
    backdrop-filter:blur(18px);
    border-radius:14px;
    padding:8px 12px;
    display:flex;
    align-items:center;
    gap:6px;
}

.label{
    font-size:9px;
    color:#888;
    letter-spacing:1px;
}

.value{
    font-size:13px;
    font-weight:700;
    color:var(--text);
}

.subs{ color:var(--subs); }
.goal{ color:var(--goal); }
.live{ color:var(--live); }

#avatar{
    width:44px;
    height:44px;
    border-radius:50%;
    border:2px solid var(--subs);
}

.status-dot{
    width:10px;
    height:10px;
    border-radius:50%;
    animation:pulse 1.5s infinite;
}

.online{ background:var(--live); }
.offline{ background:var(--offline); }

@keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.3;}
}

.goal-wrap{
    width:120px;
    height:7px;
    background:rgba(255,255,255,.08);
    border-radius:999px;
    overflow:hidden;
}

.goal-bar{
    height:100%;
    width:0%;
    background:linear-gradient(90deg,#00d9ff,#00ff88);
    transition:width .5s ease;
}

#streamTitle{
    max-width:260px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

#error{
    position:absolute;
    bottom:-22px;
    right:0;
    font-size:10px;
    color:#ff5555;
    display:none;
}

</style>
</head>

<body>

<div id="dashboard">

    <img id="avatar" src="">

    <div class="status-dot offline" id="dot"></div>

    <div class="panel">
        <span class="label">LIVE</span>
        <span class="value live" id="liveStatus">OFFLINE</span>
    </div>

    <div class="panel">
        <span class="label">SUBS</span>
        <span class="value subs" id="subs">0</span>
    </div>

    <div class="panel">
        <span class="label">GOAL</span>
        <span class="value goal" id="goalText">0 LEFT</span>
    </div>

    <div class="goal-wrap">
        <div class="goal-bar" id="goalBar"></div>
    </div>

    <div class="panel">
        <span class="label">VIEWERS</span>
        <span class="value" id="viewers">0</span>
    </div>

    <div class="panel">
        <span class="label">PEAK</span>
        <span class="value" id="peakViewers">0</span>
    </div>

    <div class="panel">
        <span class="label">STREAM</span>
        <span class="value" id="streamTitle">Waiting...</span>
    </div>

</div>

<div id="error">API error (using cached data)</div>

<script>

/* =========================
   CONFIG
========================= */

const CONFIG = {
    API_KEY: "AIzaSyAZ1zjGhtj4pA_hDVsQQzKXnUrcDAkDoWI",
    CHANNEL_ID: "UCOSm_4z9LIQUWHOc8yzPgkw",
    SUB_GOAL: 1000,
    REFRESH: 30000
};

/* =========================
   STATE (CRITICAL FIX)
========================= */

let cache = {
    subs: 0,
    avatar: ""
};

let viewerStats = {
    current: 0,
    peak: Number(localStorage.getItem("peakViewers") || 0)
};

/* =========================
   API CALLS
========================= */

async function fetchChannel(){
    return fetch(
        `https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics&id=${CONFIG.CHANNEL_ID}&key=${CONFIG.API_KEY}`
    ).then(r => r.json());
}

async function fetchLive(){
    return fetch(
        `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${CONFIG.CHANNEL_ID}&eventType=live&type=video&key=${CONFIG.API_KEY}`
    ).then(r => r.json());
}

/* =========================
   SAFE UI HELPERS
========================= */

function setSubs(value){
    document.getElementById("subs").textContent =
        value.toLocaleString();
    cache.subs = value;
}

function setGoal(subs){
    const remaining = Math.max(CONFIG.SUB_GOAL - subs, 0);

    document.getElementById("goalText").textContent =
        `${remaining.toLocaleString()} LEFT`;

    const percent = Math.min((subs / CONFIG.SUB_GOAL) * 100, 100);

    document.getElementById("goalBar").style.width =
        percent + "%";
}

/* =========================
   MAIN LOOP
========================= */

async function update(){

    const errorBox = document.getElementById("error");

    try{
        errorBox.style.display = "none";

        const [channel, live] = await Promise.all([
            fetchChannel(),
            fetchLive()
        ]);

        const info = channel?.items?.[0];

        /* =========================
           SUBS (ALWAYS SAFE)
        ========================= */
        const subs = Number(
            info?.statistics?.subscriberCount ?? cache.subs
        );

        setSubs(subs);
        setGoal(subs);

        /* =========================
           AVATAR
        ========================= */
        const avatar = info?.snippet?.thumbnails?.default?.url;
        if(avatar){
            document.getElementById("avatar").src = avatar;
            cache.avatar = avatar;
        }

        /* =========================
           LIVE STATE
        ========================= */
        const isLive = (live?.items?.length ?? 0) > 0;

        const dot = document.getElementById("dot");
        const status = document.getElementById("liveStatus");

        if(isLive){
            dot.className = "status-dot online";
            status.textContent = "LIVE";
            document.getElementById("streamTitle").textContent =
                live.items[0].snippet.title;
        }else{
            dot.className = "status-dot offline";
            status.textContent = "OFFLINE";
            document.getElementById("streamTitle").textContent =
                "No Active Stream";
        }

        /* =========================
           VIEWERS (LIVE ONLY)
        ========================= */

        const liveItem = live?.items?.[0];

        const currentViewers = Number(
            liveItem?.liveStreamingDetails?.concurrentViewers ??
            viewerStats.current
        );

        viewerStats.current = currentViewers;

        document.getElementById("viewers").textContent =
            viewerStats.current.toLocaleString();

        /* =========================
           PEAK VIEWERS (SESSION)
        ========================= */

        if(currentViewers > viewerStats.peak){
            viewerStats.peak = currentViewers;

            localStorage.setItem(
                "peakViewers",
                viewerStats.peak
            );
        }

        document.getElementById("peakViewers").textContent =
            viewerStats.peak.toLocaleString();

    }catch(err){
        console.error(err);

        errorBox.style.display = "block";

        /* =========================
           FALLBACK SAFE STATE
        ========================= */

        setSubs(cache.subs);
        setGoal(cache.subs);

        document.getElementById("viewers").textContent =
            viewerStats.current.toLocaleString();

        document.getElementById("peakViewers").textContent =
            viewerStats.peak.toLocaleString();
    }
}

/* =========================
   START
========================= */

update();
setInterval(update, CONFIG.REFRESH);

</script>

</body>
</html>

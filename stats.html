<?php
header("Content-Type: application/json");
header("Access-Control-Allow-Origin: *");
header("Cache-Control: no-store, no-cache, must-revalidate, max-age=0");

$API_KEY = "YOUR_YOUTUBE_API_KEY_HERE";
$CHANNEL_ID = "UCOSm_4z9LIQUWHOc8yzPgkw";

/* =========================
   SAFE CURL FETCH
========================= */

function fetchUrl($url){
    $ch = curl_init();

    curl_setopt($ch, CURLOPT_URL, $url);
    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);
    curl_setopt($ch, CURLOPT_TIMEOUT, 10);

    $output = curl_exec($ch);

    if(curl_errno($ch)){
        curl_close($ch);
        return null;
    }

    curl_close($ch);
    return json_decode($output, true);
}

/* =========================
   CHANNEL STATS
========================= */

$channelUrl = "https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=$CHANNEL_ID&key=$API_KEY";
$channel = fetchUrl($channelUrl);

/* =========================
   LIVE DATA
========================= */

$liveUrl = "https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=$CHANNEL_ID&eventType=live&type=video&key=$API_KEY";
$live = fetchUrl($liveUrl);

/* =========================
   OUTPUT CLEAN JSON
========================= */

echo json_encode([
    "subs" => $channel["items"][0]["statistics"]["subscriberCount"] ?? 0,
    "title" => $channel["items"][0]["snippet"]["title"] ?? "Unknown Channel",
    "live" => $live["items"][0]["snippet"]["title"] ?? null,
    "isLive" => !empty($live["items"]),
    "videoId" => $live["items"][0]["id"]["videoId"] ?? null
]);
?>
